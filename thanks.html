<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提交成功 - 云飞互联</title>
  <meta name="description" content="您的需求已成功提交，我们的技术顾问将尽快与您联系" />
  <meta name="theme-color" content="#0f172a" />

  <style>
    :root {
      --bg: #081120;
      --bg-soft: #0f172a;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --text: #e5eefc;
      --muted: #9fb1cc;
      --primary: #3b82f6;
      --primary-2: #60a5fa;
      --accent: #22c55e;
      --white: #ffffff;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(34,197,94,0.12), transparent 26%),
        linear-gradient(180deg, #07101d 0%, #0b1323 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 48px;
      max-width: 600px;
    }

    .success-icon {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 20px 50px rgba(34,197,94,0.3);
    }

    .success-icon svg {
      width: 60px;
      height: 60px;
      stroke: var(--white);
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linecenter: round;
    }

    h1 {
      font-size: 32px;
      color: var(--white);
      margin: 0 0 16px;
      font-weight: 800;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      margin: 0 0 32px;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 28px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 16px;
      transition: 0.25s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: var(--white);
      box-shadow: 0 12px 28px rgba(59,130,246,0.28);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.03);
      color: var(--white);
      border-color: rgba(255,255,255,0.14);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
    }

    @media (max-width: 640px) {
      .container {
        padding: 32px 20px;
      }

      h1 {
        font-size: 26px;
      }

      .btn-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1 id="title">提交成功，我们会尽快与您联系</h1>
    <p id="description">
      您的需求已经提交成功，我们的技术顾问将在 1 个工作日内与您联系。<br />
      在此期间，您可以浏览我们的成功案例，了解更多服务详情。
    </p>

    <div class="btn-group">
      <a href="/" class="btn btn-primary" id="btn-home">返回首页</a>
      <a href="/cases.html" class="btn btn-secondary" id="btn-cases">查看成功案例</a>
    </div>
  </div>

  <script>
    const lang = new URLSearchParams(window.location.search).get('lang');
    
    if (lang === 'en') {
      document.documentElement.lang = 'en';
      document.getElementById('title').textContent = 'Submission Successful, We Will Contact You Soon';
      document.getElementById('description').innerHTML = `
        Your request has been successfully submitted. Our technical consultant will contact you within 1 business day.<br />
        In the meantime, you can browse our successful cases to learn more about our services.
      `;
      document.getElementById('btn-home').textContent = 'Back to Home';
      document.getElementById('btn-cases').textContent = 'View Success Cases';
      document.title = 'Submission Successful - YunFei-Link';
    }
  </script>
</body>
</html>
